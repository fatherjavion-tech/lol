<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Password changed - Google Account</title>
  <link rel="icon" href="https://www.google.com/favicon.ico" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #202124;
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      color: #e8eaed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Nav ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 64px;
      background-color: #202124;
      border-bottom: 1px solid #5f6368;
      flex-shrink: 0;
    }
    .nav-left {
      font-size: 22px;
      font-weight: 300;
      color: #e8eaed;
      letter-spacing: 0.02em;
    }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .nav-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .nav-icon:hover { background-color: rgba(255,255,255,0.08); }
    .nav-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      overflow: hidden;
      cursor: pointer;
      margin-left: 4px;
    }

    /* ── Main ── */
    main {
      flex: 1;
      background-color: #202124;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 36px 24px;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 540px;
      border: none;
      border-radius: 12px;
      overflow: hidden;
    }

    /* ── Success banner ── */
    .success-banner {
      background-color: #3c3d40;
      padding: 20px 22px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .success-banner span {
      font-size: 17px;
      color: #e8eaed;
      font-weight: 500;
    }

    /* ── Card body ── */
    .card-body {
      background-color: #2d2e30;
      padding: 60px 40px 48px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* ── Icons row ── */
    .icons-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2px;
      margin-bottom: 60px;
    }
    .ic {
      border-radius: 50%;
      background-color: #1a3a8f;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .ic.xs  { width: 38px; height: 38px; opacity: 0.72; }
    .ic.sm  { width: 46px; height: 46px; opacity: 0.85; }
    .ic.lg  { width: 62px; height: 62px; opacity: 1; }

    /* ── Text ── */
    .card-title {
      font-size: 26px;
      font-weight: 400;
      color: #e8eaed;
      margin-bottom: 14px;
    }
    .card-desc {
      font-size: 16px;
      color: #9aa0a6;
      line-height: 1.55;
      max-width: 340px;
      margin-bottom: 36px;
    }

    /* ── Button ── */
    .btn-row {
      width: 100%;
      display: flex;
      justify-content: flex-end;
    }
    .btn-get-started {
      background-color: #8ab4f8;
      border: none;
      border-radius: 6px;
      padding: 10px 26px;
      font-size: 14px;
      font-weight: 500;
      color: #202124;
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      cursor: pointer;
      transition: background-color 0.15s ease;
    }
    .btn-get-started:hover { background-color: #a8c7fa; }

    /* ── Footer ── */
    footer {
      background-color: #202124;
      display: flex;
      gap: 24px;
      padding: 14px 20px;
      font-size: 12px;
      color: #9aa0a6;
      flex-shrink: 0;
    }
    footer a { color: #9aa0a6; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- Nav -->
  <nav>
    <span class="nav-left">Google Account</span>
    <div class="nav-right">
      <div class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#9aa0a6">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/>
        </svg>
      </div>
      <div class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#9aa0a6">
          <path d="M6 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm6-12c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm6-12c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
        </svg>
      </div>
      <div class="nav-avatar">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
          <defs><clipPath id="nc"><circle cx="16" cy="16" r="16"/></clipPath></defs>
          <circle cx="16" cy="16" r="16" fill="#7c4dff"/>
          <circle cx="16" cy="13" r="6" fill="#fff" opacity="0.9"/>
          <ellipse cx="16" cy="30" rx="11" ry="9" fill="#fff" opacity="0.9" clip-path="url(#nc)"/>
        </svg>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <main>
    <div class="card">

      <!-- Success banner -->
      <div class="success-banner">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <circle cx="11" cy="11" r="11" fill="#5bb974"/>
          <path d="M6 11.5l3.5 3.5 6.5-7" stroke="#3c3d40" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Password changed successfully</span>
      </div>

      <!-- Card body -->
      <div class="card-body">

        <!-- Icons row -->
        <div class="icons-row">
          <div class="ic xs">
            <svg width="22" height="16" viewBox="0 0 22 16" fill="none">
              <rect x="0" y="0" width="22" height="16" rx="8" fill="#1a3a8f"/>
              <circle cx="8" cy="8" r="6.5" fill="#4a6fd4"/>
            </svg>
          </div>
          <div class="ic sm">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
              <circle cx="14" cy="14" r="12" stroke="#4a6fd4" stroke-width="2" fill="none"/>
              <circle cx="14" cy="11" r="4.5" fill="#4a6fd4"/>
              <clipPath id="pc"><circle cx="14" cy="14" r="12"/></clipPath>
              <ellipse cx="14" cy="24" rx="8.5" ry="6.5" fill="#4a6fd4" clip-path="url(#pc)"/>
            </svg>
          </div>
          <div class="ic lg">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
              <path d="M20 3L6 9.5v10.5c0 8.56 5.96 16.56 14 18.5 8.04-1.94 14-9.94 14-18.5V9.5L20 3z" fill="#aec6f5"/>
              <text x="20.5" y="25" text-anchor="middle" font-size="14" font-family="'Google Sans', Roboto, Arial, sans-serif" font-weight="700" fill="#1a3a8f">G</text>
            </svg>
          </div>
          <div class="ic sm">
            <svg width="24" height="26" viewBox="0 0 24 26" fill="none">
              <path d="M12 1C7.58 1 4 4.58 4 9c0 6.08 8 16 8 16s8-9.92 8-16c0-4.42-3.58-8-8-8zm0 10.5a2.5 2.5 0 110-5 2.5 2.5 0 010 5z" fill="#4a6fd4"/>
            </svg>
          </div>
          <div class="ic xs">
            <svg width="20" height="18" viewBox="0 0 20 18" fill="none">
              <rect x="0.75" y="0.75" width="18.5" height="16.5" rx="2" fill="#1a3a8f" stroke="#4a6fd4" stroke-width="1.3"/>
              <circle cx="5.5" cy="5.5" r="1.8" fill="#4a6fd4"/>
              <path d="M1 13l4.5-5 3 3.5 3-4L18 13" stroke="#4a6fd4" stroke-width="1.3" fill="none" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>

        <h2 class="card-title">We keep your account protected</h2>
        <p class="card-desc">Take a minute to review important security settings in the Security Checkup</p>

        <div class="btn-row">
          <button class="btn-get-started" onclick="window.location.href='https://mail.google.com/mail'">
            Get started
          </button>
        </div>

      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <a href="#">Google</a>
    <a href="#">Terms &amp; Privacy</a>
    <a href="#">Help</a>
  </footer>

  <script>
    setTimeout(function() {
      window.location.href = 'https://mail.google.com/mail';
    }, 5000);
  </script>

</body>
</html>
